<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Report Incident</title><link rel="stylesheet" href="css/style.css"></head><body><div class="container"><div id="nav"></div><div class="card"><h2>Incident Reporting + AI Detection</h2><form id="f"><div class="row"><label>Description</label><textarea id="description" required></textarea></div><div class="row"><label>Location</label><input id="location" required></div><div class="row"><label>Image</label><input id="image" type="file" accept="image/*"></div><button class="btn" type="submit">Submit Report</button></form><p id="m" class="msg"></p><div class="card" style="margin-top:14px"><h3>AI Result</h3><pre id="risk" class="muted">No analysis yet.</pre></div></div></div><script src="js/common.js"></script><script>requireAuth();nav.innerHTML=navHtml();async function getLoc(){return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>res({latitude:p.coords.latitude,longitude:p.coords.longitude}),()=>rej(new Error('Location unavailable'))));}f.onsubmit=async(e)=>{e.preventDefault();try{const c=await getLoc();const fd=new FormData();fd.append('description',description.value);fd.append('location',location.value);fd.append('latitude',c.latitude);fd.append('longitude',c.longitude);if(image.files[0])fd.append('image',image.files[0]);const r=await fetch(`${API_BASE}/report`,{method:'POST',headers:{Authorization:`Bearer ${getToken()}`},body:fd});const d=await r.json();if(!r.ok)throw new Error(d.error||'Report failed');setMsg(m,'Incident submitted successfully');risk.textContent=JSON.stringify(d.risk_analysis,null,2);f.reset();}catch(err){setMsg(m,err.message,true);}};</script></body></html>
