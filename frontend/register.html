<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:420px;margin:60px auto">
      <h2>Create Account</h2>
      <form id="registerForm">
        <div class="row"><label>Name</label><input id="name" required></div>
        <div class="row"><label>Email</label><input id="email" type="email" required></div>
        <div class="row"><label>Password</label><input id="password" type="password" required></div>
        <div class="row"><label>Role</label>
          <select id="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button class="btn" type="submit">Register</button>
      </form>
      <p id="m" class="msg"></p>
      <p class="muted">Already registered? <a href="login.html">Login</a></p>
    </div>
  </div>
  <script src="js/common.js"></script>
  <script>
    const form = document.getElementById("registerForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const payload = {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          role: document.getElementById("role").value,
        };
        const data = await api("/register", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload),
        });
        saveAuth(data.token, data.user);
        window.location = "dashboard.html";
      } catch (err) {
        setMsg(document.getElementById("m"), err.message, true);
      }
    });
  </script>
</body>
</html>
