<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SOS</title><link rel="stylesheet" href="css/style.css"></head><body><div class="container"><div id="nav"></div><div class="card"><h2>SOS Emergency</h2><p class="muted">Fetch your live location and send emergency alert.</p><div class="actions"><button id="loc" class="btn btn-outline">Get Location</button><button id="sos" class="btn btn-danger">Trigger SOS</button></div><p id="coords" class="msg"></p><iframe id="map" class="map"></iframe><p id="m" class="msg"></p></div></div><script src="js/common.js"></script><script>requireAuth();nav.innerHTML=navHtml();let c=null;function loadMap(){if(!c)return;const b=`${c.longitude-0.01},${c.latitude-0.01},${c.longitude+0.01},${c.latitude+0.01}`;map.src=`https://www.openstreetmap.org/export/embed.html?bbox=${b}&layer=mapnik&marker=${c.latitude},${c.longitude}`;}async function getLoc(){return new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>{c={latitude:p.coords.latitude,longitude:p.coords.longitude};coords.textContent=`Lat: ${c.latitude.toFixed(5)} | Lng: ${c.longitude.toFixed(5)}`;loadMap();res(c);},()=>rej(new Error('Location permission denied'))));}loc.onclick=async()=>{try{await getLoc();setMsg(m,'Location fetched');}catch(e){setMsg(m,e.message,true);}};sos.onclick=async()=>{try{if(!c)await getLoc();const d=await api('/sos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});setMsg(m,`${d.message}. Notified contacts: ${d.notified_contacts}`);}catch(e){setMsg(m,e.message,true);}};</script></body></html>
